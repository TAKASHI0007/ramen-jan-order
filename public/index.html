<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ラーメンじゃん QRオーダー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFEAD8;
    --paper-card:#F8F5EA;
    --paper-deep:#E3DCC6;
    --ink:#2B2A26;
    --ink-soft:#736C58;
    --stamp-red:#A8392B;
    --herb:#4F6F52;
    --brass:#B8863B;
    --line:#C9C0A4;
    --font-display:'Courier Prime', monospace;
    --font-body:'Work Sans', sans-serif;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;}
  button:focus-visible, [tabindex]:focus-visible, textarea:focus-visible, input:focus-visible{
    outline:3px solid var(--stamp-red);
    outline-offset:2px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}

  header.topbar{ padding:18px 18px 0 18px; }
  .eyebrow{
    font-family:var(--font-display);
    font-size:11px;
    letter-spacing:0.22em;
    color:var(--ink-soft);
    text-transform:uppercase;
  }
  .shopname{
    font-family:var(--font-display);
    font-size:26px;
    font-weight:700;
    margin:2px 0 0 0;
    letter-spacing:0.02em;
  }
  .city-tag{font-size:11px;color:var(--ink-soft);margin:2px 0 10px 0;}
  .lang-switch{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .lang-btn{
    background:none;border:1.5px solid var(--line);border-radius:7px;
    padding:5px 10px;font-size:11.5px;color:var(--ink-soft);font-family:var(--font-display);
  }
  .lang-btn.active{background:var(--ink);color:var(--paper-card);border-color:var(--ink);}

  main{flex:1;padding:14px 18px 110px 18px;}

  .section-title{
    font-family:var(--font-display);
    font-size:13px;
    letter-spacing:0.1em;
    color:var(--ink-soft);
    margin:18px 0 10px 0;
    text-transform:uppercase;
  }
  .seat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .seat-btn{
    background:var(--paper-card);
    border:1.5px solid var(--line);
    border-radius:var(--radius);
    padding:16px 6px;
    text-align:center;
    font-family:var(--font-display);
    font-size:13px;
    color:var(--ink);
  }
  .seat-btn:active{background:var(--paper-deep);}
  .seat-btn .seat-sub{display:block;font-family:var(--font-body);font-size:10px;color:var(--ink-soft);margin-top:4px;}

  .cat-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:4px;-webkit-overflow-scrolling:touch;}
  .cat-tabs::-webkit-scrollbar{display:none;}
  .cat-tab{
    flex:0 0 auto;
    background:transparent;
    border:1.5px solid var(--ink);
    border-radius:999px;
    padding:7px 14px;
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
    color:var(--ink);
  }
  .cat-tab.active{background:var(--ink);color:var(--paper-card);}

  .menu-item{padding:14px 0;border-bottom:1px dashed var(--line);}
  .menu-item-row{display:flex;align-items:baseline;gap:6px;}
  .menu-item-name{font-weight:600;font-size:15px;}
  .leader{flex:1;border-bottom:2px dotted var(--line);height:0;transform:translateY(-3px);}
  .menu-item-price{font-family:var(--font-display);font-size:14px;color:var(--ink);white-space:nowrap;}
  .menu-item-desc{font-size:12.5px;color:var(--ink-soft);margin-top:3px;line-height:1.45;}
  .menu-item-note{font-size:11.5px;color:var(--brass);margin-top:5px;line-height:1.5;}
  .qty-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;}
  .qty-stepper{display:flex;align-items:center;gap:0;border:1.5px solid var(--ink);border-radius:8px;overflow:hidden;}
  .qty-stepper button{
    background:var(--paper-card);
    border:none;
    width:34px;height:32px;
    font-size:16px;
    font-weight:700;
    color:var(--ink);
  }
  .qty-stepper button:active{background:var(--paper-deep);}
  .qty-stepper .qty-val{width:30px;text-align:center;font-family:var(--font-display);font-size:14px;}
  .qty-stepper.small button{width:26px;height:26px;font-size:13px;}
  .qty-stepper.small .qty-val{width:22px;font-size:12px;}
  .add-btn{
    background:var(--ink);
    color:var(--paper-card);
    border:none;
    border-radius:8px;
    padding:8px 16px;
    font-size:13px;
    font-weight:600;
  }
  .add-btn.small{padding:6px 12px;font-size:12px;}

  .variant-list{margin-top:10px;}
  .variant-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;border-top:1px dashed var(--line);}
  .variant-label{font-size:13px;font-weight:600;flex:1;}
  .variant-price{font-family:var(--font-display);font-size:12.5px;color:var(--ink-soft);white-space:nowrap;}

  .config-group{margin-top:13px;}
  .config-label{font-size:10.5px;color:var(--ink-soft);letter-spacing:0.06em;margin-bottom:6px;text-transform:uppercase;font-family:var(--font-display);}
  .pill-row{display:flex;gap:8px;flex-wrap:wrap;}
  .pill{background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:7px 13px;font-size:12.5px;color:var(--ink);}
  .pill.active{background:var(--ink);color:var(--paper-card);border-color:var(--ink);}
  .config-hint{font-size:11px;color:var(--stamp-red);margin-top:7px;line-height:1.5;}
  .added-lines{margin-top:14px;padding-top:10px;border-top:1px dashed var(--line);}
  .added-line{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 0;}
  .added-line .al-desc{font-size:12px;color:var(--ink-soft);}

  .cart-bar{
    position:fixed;
    bottom:0;left:0;right:0;
    max-width:480px;margin:0 auto;
    background:var(--ink);
    color:var(--paper-card);
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-radius:14px 14px 0 0;
    box-shadow:0 -4px 18px rgba(0,0,0,0.25);
  }
  .cart-bar .cart-info{font-family:var(--font-display);font-size:13.5px;}
  .cart-bar button{
    background:var(--stamp-red);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:10px 18px;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.03em;
  }

  .sheet-overlay{
    position:fixed;inset:0;
    background:rgba(20,18,14,0.45);
    display:flex;align-items:flex-end;justify-content:center;
    z-index:50;
  }
  .sheet{
    background:var(--paper-card);
    width:100%;max-width:480px;
    border-radius:16px 16px 0 0;
    max-height:85vh;
    overflow-y:auto;
    padding:20px 18px 24px 18px;
  }
  .sheet-handle{width:40px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 16px auto;}
  .sheet h2{font-family:var(--font-display);font-size:17px;margin:0 0 14px 0;}
  .review-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--line);}
  .review-row .ri-name{font-size:14px;font-weight:600;}
  .review-row .ri-meta{font-size:11.5px;color:var(--ink-soft);}
  .review-row .ri-price{font-family:var(--font-display);font-size:13px;}
  .notes-input{
    width:100%;border:1.5px solid var(--line);border-radius:8px;padding:10px;
    font-family:var(--font-body);font-size:13px;margin-top:14px;min-height:60px;
    resize:vertical;background:var(--paper);color:var(--ink);
  }
  .total-row{display:flex;justify-content:space-between;align-items:baseline;padding:16px 0 4px 0;font-family:var(--font-display);}
  .total-row .label{font-size:13px;color:var(--ink-soft);}
  .total-row .value{font-size:22px;font-weight:700;}
  .submit-btn{
    width:100%;
    background:var(--stamp-red);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:15px;
    font-size:15px;
    font-weight:700;
    margin-top:14px;
    letter-spacing:0.02em;
  }
  .close-sheet{
    width:100%;background:none;border:1.5px solid var(--line);border-radius:10px;
    padding:11px;margin-top:8px;font-size:13px;color:var(--ink-soft);
  }
  .remove-x{background:none;border:none;color:var(--stamp-red);font-size:18px;line-height:1;padding:4px 6px;}

  .confirm-wrap{padding-top:30px;text-align:center;}
  .ticket-card{
    background:var(--paper-card);
    border:1.5px solid var(--ink);
    border-radius:var(--radius);
    padding:26px 20px 20px 20px;
    position:relative;
    margin-bottom:20px;
  }
  .ticket-number{font-family:var(--font-display);font-size:42px;font-weight:700;letter-spacing:0.04em;}
  .ticket-table{font-size:13px;color:var(--ink-soft);margin-top:4px;}
  .stamp{
    display:inline-block;
    border:3px solid currentColor;
    border-radius:5px;
    padding:4px 14px;
    transform:rotate(-3deg);
    font-family:var(--font-display);
    letter-spacing:0.1em;
    font-weight:700;
    font-size:13px;
    mix-blend-mode:multiply;
    margin-top:16px;
  }
  .stamp.s-new{color:var(--stamp-red);}
  .stamp.s-cooking{color:var(--brass);}
  .stamp.s-served{color:var(--herb);}
  .perforation{
    position:absolute;left:0;right:0;bottom:-1px;height:14px;
    background-image:radial-gradient(circle, var(--paper) 6px, transparent 7px);
    background-size:18px 18px;
    background-position:9px 0;
  }
  .help-text{font-size:12.5px;color:var(--ink-soft);line-height:1.6;margin-bottom:18px;}
  .secondary-btn{
    background:var(--ink);color:var(--paper-card);border:none;border-radius:10px;
    padding:13px 20px;font-size:14px;font-weight:600;
  }
  .pay-note{font-size:11.5px;color:var(--ink-soft);margin-top:22px;}

  .staff-summary{display:flex;gap:8px;margin-bottom:16px;}
  .chip{
    flex:1;background:var(--paper-card);border:1.5px solid var(--line);border-radius:8px;
    padding:8px 6px;text-align:center;
  }
  .chip .chip-n{font-family:var(--font-display);font-size:18px;font-weight:700;}
  .chip .chip-l{font-size:10.5px;color:var(--ink-soft);letter-spacing:0.04em;}
  .order-ticket{
    background:var(--paper-card);
    border:1.5px solid var(--ink);
    border-radius:var(--radius);
    margin-bottom:18px;
    padding:14px 16px 18px 16px;
    position:relative;
  }
  .order-ticket .ot-head{display:flex;align-items:baseline;gap:8px;}
  .ot-num{font-family:var(--font-display);font-size:20px;font-weight:700;}
  .ot-table{font-size:12px;color:var(--ink-soft);}
  .ot-metric-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .ot-metric-icon{font-size:14px;}
  .ot-metric-label{font-size:11px;color:var(--ink-soft);}
  .ot-metric-val{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:0.02em;}
  .ot-metric-val.live{color:var(--brass);}
  .ot-metric-val.done{color:var(--herb);}
  .ot-metric-badge{display:flex;align-items:center;gap:5px;background:var(--paper);border-radius:8px;padding:4px 10px;}
  .ot-items{margin:10px 0;padding-top:8px;border-top:1px dashed var(--line);}
  .ot-item-row{display:flex;justify-content:space-between;font-size:13.5px;padding:3px 0;gap:6px;}
  .ot-item-row .it-qty{font-family:var(--font-display);color:var(--ink-soft);width:28px;flex:0 0 auto;}
  .ot-item-row .it-desc{flex:1;}
  .ot-notes{font-size:12px;color:var(--stamp-red);margin-top:8px;background:#F6EAE6;padding:7px 9px;border-radius:7px;line-height:1.5;}
  .ot-actions{display:flex;gap:8px;align-items:center;margin-top:10px;}
  .ot-actions .advance-btn{
    flex:1;background:var(--ink);color:var(--paper-card);border:none;border-radius:8px;
    padding:11px;font-size:13px;font-weight:700;
  }
  .ot-actions .advance-btn.ready{background:var(--herb);}
  .ot-actions .advance-btn.pay-due{background:var(--brass);}
  .ot-actions .advance-btn.outline{background:none;border:1.5px solid var(--line);color:var(--ink-soft);}
  .ot-actions .cancel-btn{
    background:none;border:1.5px solid var(--line);color:var(--ink-soft);border-radius:8px;
    padding:11px 12px;font-size:12px;
  }
  .empty-state{
    text-align:center;padding:50px 10px;color:var(--ink-soft);font-size:13.5px;line-height:1.7;
  }
  .staff-tools{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .ghost-btn{background:none;border:none;color:var(--ink-soft);font-size:12px;text-decoration:underline;padding:6px;}

  /* スタッフタブ */
  .staff-tabs{display:flex;gap:0;border-bottom:2px solid var(--ink);margin-top:10px;}
  .staff-tab-btn{
    flex:1;background:none;border:none;padding:9px 4px;font-family:var(--font-display);
    font-size:13px;color:var(--ink-soft);border-bottom:3px solid transparent;margin-bottom:-2px;
  }
  .staff-tab-btn.active{color:var(--ink);border-bottom:3px solid var(--stamp-red);}

  /* 集計タブ */
  .summary-period-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .summary-period-btn{
    background:none;border:1.5px solid var(--line);border-radius:999px;
    padding:7px 14px;font-size:12.5px;color:var(--ink);
  }
  .summary-period-btn.active{background:var(--ink);color:var(--paper-card);border-color:var(--ink);}
  .summary-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
  .summary-card{
    background:var(--paper-card);border:1.5px solid var(--line);border-radius:var(--radius);
    padding:14px 12px;text-align:center;
  }
  .sc-val{font-family:var(--font-display);font-size:28px;font-weight:700;line-height:1.1;}
  .sc-unit{font-size:16px;font-weight:400;}
  .sc-label{font-size:10.5px;color:var(--ink-soft);margin-top:4px;letter-spacing:0.04em;}
  .summary-table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:13px;}
  .summary-table tr{border-bottom:1px dashed var(--line);}
  .summary-table td{padding:9px 6px;}
  .st-rank{font-family:var(--font-display);color:var(--ink-soft);width:24px;}
  .st-name{flex:1;font-weight:600;}
  .st-count{color:var(--ink-soft);white-space:nowrap;text-align:right;}
  .st-rev{font-family:var(--font-display);font-size:12px;white-space:nowrap;text-align:right;}
  .csv-btn{
    width:100%;background:var(--herb);color:#fff;border:none;border-radius:10px;
    padding:14px;font-size:14px;font-weight:700;margin-top:8px;margin-bottom:10px;
  }
  .clear-all-btn{
    width:100%;background:none;border:1.5px solid var(--stamp-red);color:var(--stamp-red);
    border-radius:10px;padding:12px;font-size:13px;font-weight:600;margin-bottom:28px;
  }
</style>
</head>
<body>
<div id="app"></div>

/* =========================================================
   完全分離：URLで客側/スタッフ側を判定
   客側: 通常のリンク（?table=... でその席に自動着席）
   スタッフ側: リンク末尾に #staff を付けて開く
   ========================================================= */

function t(key){ return (UI[lang] && UI[lang][key]) || (UI.ja && UI.ja[key]) || key; }
function tm(obj){ if(!obj) return ''; return obj[lang] || obj.ja || obj.en || ''; }

function makeKey(itemId, variantId, protein, spice){ return [itemId, variantId, protein||'-', spice||'-'].join('::'); }
function parseKey(key){
  const parts = key.split('::');
  return {itemId:parts[0], variantId:parts[1], protein:parts[2], spice:parts[3]};
}
function findLine(key){
  const {itemId, variantId} = parseKey(key);
  const item = CONFIG.menu.find(m=>m.id===itemId);
  if(!item) return null;
  const variant = item.variants.find(v=>v.id===variantId);
  if(!variant) return null;
  return {item, variant};
}
function getSelection(item){
  if(!selections[item.id]){
    selections[item.id] = {variant:item.variants[0].id, protein:'pork', spice:'normal', qty:1};
  }
  return selections[item.id];
}
function cartCount(){ return Object.values(cart).reduce((a,b)=>a+b,0); }
function cartTotal(){
  return Object.entries(cart).reduce((sum,[key,qty])=>{
    const fv = findLine(key);
    return sum + (fv ? fv.variant.price*qty : 0);
  },0);
}
function cartBarText(){
  const n = cartCount(), total = cartTotal();
  const unit = lang==='ja'?'点':lang==='en'?'items':lang==='ru'?'поз.':'միավոր';
  return `🧾 ${n} ${unit} ・ ${total} ${CONFIG.currency}`;
}
function seatLabel(id){
  const s = CONFIG.seats.find(s=>s.id===id);
  return s ? tm(s.label) : id;
}
function fmtElapsed(ts){
  const secs = Math.max(0, Math.floor((Date.now()-ts)/1000));
  if(secs<60) return secs+t('secUnit');
  const m = Math.floor(secs/60), s = secs%60;
  return m+t('minUnit')+(s>0?s+t('secUnit'):'');
}
function fmtDuration(ms){
  const secs = Math.max(0, Math.round(ms/1000));
  if(secs<60) return secs+t('secUnit');
  const m = Math.floor(secs/60), s = secs%60;
  return m+t('minUnit')+(s>0?s+t('secUnit'):'');
}
function fmtMetric(startTs, endTs){
  return endTs ? fmtDuration(endTs-startTs) : fmtElapsed(startTs);
}
function localDateStr(ts){
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function localDateTimeStr(ts){
  const d = new Date(ts);
  return `${localDateStr(ts)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function getPeriodRange(period){
  const now = Date.now();
  const d = new Date(); d.setHours(0,0,0,0);
  const todayStart = d.getTime();
  if(period==='today') return [todayStart, now];
  if(period==='yesterday') return [todayStart-86400000, todayStart];
  if(period==='last7') return [todayStart-6*86400000, now];
  if(period==='week'){
    const day = d.getDay();
    const diffToMon = (day===0)?6:day-1;
    return [todayStart - diffToMon*86400000, now];
  }
  if(period==='month'){
    return [new Date(d.getFullYear(), d.getMonth(), 1).getTime(), now];
  }
  return [0, now];
}
function filterOrders(orders, period){
  const [from, to] = getPeriodRange(period);
  return orders.filter(o=>o.createdAt>=from && o.createdAt<=to);
}
function avgSecs(orders, field){
  const timed = orders.filter(o=>o[field]);
  if(!timed.length) return null;
  return Math.max(0, Math.round(timed.reduce((s,o)=>s+(o[field]-o.createdAt),0)/timed.length/1000));
}
function fmtAvgTime(secs){
  if(secs===null) return '—';
  if(secs<60) return secs+t('secUnit');
  const m=Math.floor(secs/60), s=secs%60;
  return m+t('minUnit')+(s>0?s+t('secUnit'):'');
}

function attachMenuItemHandlers(main){
  main.querySelectorAll('[data-act="inc"],[data-act="dec"]').forEach(btn=>{
    btn.onclick = ()=>{
      const key = btn.dataset.key;
      if(btn.dataset.act==='inc'){ cart[key]=(cart[key]||0)+1; }
      else{ cart[key]=Math.max(0,(cart[key]||0)-1); if(cart[key]===0) delete cart[key]; }
      renderMenuListOnly();
      renderCartBar();
      if(sheetOpen) renderReviewSheet();
    };
  });
  main.querySelectorAll('.pill[data-field]').forEach(btn=>{
    btn.onclick = ()=>{
      const item = CONFIG.menu.find(m=>m.id===btn.dataset.item);
      const sel = getSelection(item);
      sel[btn.dataset.field] = btn.dataset.value;
      if(btn.dataset.field==='spice'){
        sel.protein = (btn.dataset.value==='spicy') ? 'ground' : 'pork';
      }
      renderMenuListOnly();
    };
  });
  main.querySelectorAll('[data-act="cfg-inc"]').forEach(btn=>{
    btn.onclick = ()=>{ const item=CONFIG.menu.find(m=>m.id===btn.dataset.item); getSelection(item).qty++; renderMenuListOnly(); };
  });
  main.querySelectorAll('[data-act="cfg-dec"]').forEach(btn=>{
    btn.onclick = ()=>{ const item=CONFIG.menu.find(m=>m.id===btn.dataset.item); const sel=getSelection(item); sel.qty=Math.max(1,sel.qty-1); renderMenuListOnly(); };
  });
  main.querySelectorAll('[data-act="cfg-add"]').forEach(btn=>{
    btn.onclick = ()=>{
      const item = CONFIG.menu.find(m=>m.id===btn.dataset.item);
      const sel = getSelection(item);
      const key = makeKey(item.id, sel.variant, sel.protein, sel.spice);
      cart[key] = (cart[key]||0) + sel.qty;
      sel.qty = 1;
      renderMenuListOnly();
      renderCartBar();
      if(sheetOpen) renderReviewSheet();
    };
  });
}

function renderReviewSheet(){

  if(overlay) overlay.remove();
  if(!sheetOpen) return;
  const entries = Object.entries(cart);
  overlay = document.createElement('div');
  overlay.id = 'sheet-overlay';
  overlay.className = 'sheet-overlay';
  overlay.innerHTML = `
    <div class="sheet">
      <div class="sheet-handle"></div>
      <h2>${t('reviewTitleBase')} (${seatLabel(selectedTable)})</h2>
      ${entries.length===0?`<p class="help-text">${t('empty')}</p>`:entries.map(([key,qty])=>{
        const fv = findLine(key);
        if(!fv) return '';
        const {item,variant} = fv;
        const {protein,spice} = parseKey(key);
        const extra = [];
        if(variant.label) extra.push(tm(variant.label));
        if(protein && protein!=='-') extra.push(protein==='chicken'? t('chickenChashuShort') : protein==='ground'? t('groundPorkShort') : t('porkChashuShort'));
        if(spice && spice!=='-') extra.push(spice==='spicy'? t('spicySpice') : t('normalSpice'));
        const label = extra.length? ` (${extra.join(' ・ ')})` : '';
        return `
          <div class="review-row">
            <div>
              <div class="ri-name">${tm(item.name)}${label}</div>
              <div class="ri-meta">${variant.price} ${CONFIG.currency} × ${qty}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="ri-price">${variant.price*qty} ${CONFIG.currency}</span>
              <button class="remove-x" data-key="${key}">×</button>
            </div>
          </div>
        `;
      }).join('')}
      <textarea id="order-notes" class="notes-input" placeholder="${t('notesPlaceholder')}">${orderNotes}</textarea>
      <div class="total-row">
        <span class="label">${t('total')}</span>
        <span class="value">${cartTotal()} ${CONFIG.currency}</span>
      </div>
      <button class="submit-btn" id="submit-order" ${entries.length===0?'disabled style="opacity:0.4;"':''}>${t('submit')}</button>
      <button class="close-sheet" id="close-sheet">${t('backToMenu')}</button>
    </div>
  `;
  document.getElementById('app').appendChild(overlay);
  overlay.querySelectorAll('.remove-x').forEach(btn=>{
    btn.onclick = ()=>{ delete cart[btn.dataset.key]; renderReviewSheet(); renderMenuListOnly(); renderCartBar(); };
  });
  const notesEl = document.getElementById('order-notes');
  if(notesEl){ notesEl.oninput = ()=>{ orderNotes = notesEl.value; }; }
  document.getElementById('close-sheet').onclick = ()=>{ sheetOpen=false; renderReviewSheet(); };
  const submitBtn = document.getElementById('submit-order');
  if(submitBtn && entries.length>0){ submitBtn.onclick = submitOrder; }
  overlay.onclick = (e)=>{ if(e.target===overlay){ sheetOpen=false; renderReviewSheet(); } };
}

async function submitOrder(){
  if(busy) return;
  busy = true;
  const btn = document.getElementById('submit-order');
  const notesEl = document.getElementById('order-notes');
  if(notesEl) orderNotes = notesEl.value.trim();
  if(btn){ btn.disabled=true; btn.textContent='…'; }
  try{
    const items = Object.entries(cart).map(([key,qty])=>{
      const {itemId,variantId,protein,spice} = parseKey(key);
      const fv = findLine(key);
      return {
        itemId,
        variantId,
        protein: (protein && protein!=='-') ? protein : null,
        spice: (spice && spice!=='-') ? spice : null,
        price: fv.variant.price,
        qty
      };
    });
    const res = await fetch('/api/orders', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ table:selectedTable, items, notes:orderNotes, total:cartTotal() })
    });
    if(!res.ok) throw new Error('Request failed: '+res.status);
    const order = await res.json();
    myOrderId = order.id;
    cart = {};
    selections = {};
    orderNotes = '';
    sheetOpen = false;
    renderCustomerApp();
    pollTimer = setInterval(renderConfirmationLive, 4000);
  }catch(e){
    console.error(e);
    if(btn){ btn.disabled=false; btn.textContent=t('submit'); }
    alert('Error / エラー');
  }
  busy = false;
}

async function renderConfirmation(main){
  const state = await fetchOrdersState();
  const order = state.orders.find(o=>o.id===myOrderId);
  main.innerHTML = confirmationHtml(order);
  bindConfirmationButtons();
}
async function renderConfirmationLive(){
  if(!myOrderId) return;
  const state = await fetchOrdersState();
  const order = state.orders.find(o=>o.id===myOrderId);
  const main = document.getElementById('main');
  if(main){ main.innerHTML = confirmationHtml(order); bindConfirmationButtons(); }
}
function confirmationHtml(order){
  if(!order){ return `<div class="empty-state">${t('loadError')}</div>`; }
  const stampClass = order.status==='new'?'s-new':order.status==='cooking'?'s-cooking':'s-served';
  const stampLabel = (STATUS[lang]&&STATUS[lang][order.status]) || STATUS.ja[order.status];
  return `
    <div class="confirm-wrap">
      <p class="help-text">${t('thanksLine')}</p>
      <div class="ticket-card">
        <div class="ticket-number">#${String(order.id).padStart(3,'0')}</div>
        <div class="ticket-table">${seatLabel(order.table)}</div>
        <div class="stamp ${stampClass}">${stampLabel}</div>
        <div class="perforation"></div>
      </div>
      <button class="secondary-btn" id="order-more">${t('orderMore')}</button>
      <p class="pay-note">${t('payNote')}</p>
    </div>
  `;
}
function bindConfirmationButtons(){
  const btn = document.getElementById('order-more');
  if(btn){
    btn.onclick = ()=>{
      myOrderId = null;
      clearInterval(pollTimer);
      pollTimer = null;
      renderCustomerApp();
    };
  }
}

/* =========================================================
   描画：スタッフ側（完全に別アプリ。 #staff でのみ到達）
   ========================================================= */
function renderStaffApp(){
  root.innerHTML = `
    <header class="topbar">
      <div class="eyebrow">STAFF DISPLAY</div>
      <div class="shopname">${tm(CONFIG.shopName)}</div>
      <div class="city-tag">${t('staffSubtitle')}</div>
      <div class="lang-switch">
        <button class="lang-btn ${lang==='ja'?'active':''}" data-lang="ja">日本語</button>
        <button class="lang-btn ${lang==='en'?'active':''}" data-lang="en">EN</button>
        <button class="lang-btn ${lang==='ru'?'active':''}" data-lang="ru">RU</button>
        <button class="lang-btn ${lang==='hy'?'active':''}" data-lang="hy">ՀԱՅ</button>
      </div>
      <div class="staff-tabs">
        <button class="staff-tab-btn ${staffTab==='tickets'?'active':''}" data-tab="tickets">${t('ticketsTab')}</button>
        <button class="staff-tab-btn ${staffTab==='summary'?'active':''}" data-tab="summary">${t('summaryTab')}</button>
      </div>
    </header>
    <main id="main"></main>
  `;
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.onclick = ()=>{ lang = b.dataset.lang; renderStaffApp(); };
  });
  document.querySelectorAll('.staff-tab-btn').forEach(b=>{
    b.onclick = ()=>{
      staffTab = b.dataset.tab;
      clearInterval(pollTimer); pollTimer = null;
      renderStaffApp();
    };
  });
  const main = document.getElementById('main');
  renderStaff(main);
  if(staffTab==='tickets' && !pollTimer){ pollTimer = setInterval(renderStaffLive, 1000); }
}
async function renderStaff(main){
  main.innerHTML = `<div class="empty-state">${t('loadingTickets')}</div>`;
  const state = await fetchOrdersState();
  if(staffTab==='summary'){
    main.innerHTML = summaryHtml(state.orders);
    bindSummaryButtons(state.orders);
  } else {
    main.innerHTML = staffHtml(state);
    bindStaffButtons();
  }
}
async function renderStaffLive(){
  const state = await fetchOrdersState();
  const main = document.getElementById('main');
  if(!main) return;
  if(staffTab==='summary'){
    main.innerHTML = summaryHtml(state.orders);
    bindSummaryButtons(state.orders);
  } else {
    main.innerHTML = staffHtml(state);
    bindStaffButtons();
  }
}
function staffHtml(state){
  const active = state.orders.filter(o=>!o.archived).sort((a,b)=>a.createdAt-b.createdAt);
  const nNew = active.filter(o=>o.status==='new').length;
  const nCooking = active.filter(o=>o.status==='cooking').length;
  const nServed = active.filter(o=>o.status==='served').length;
  const nUnpaid = active.filter(o=>!o.paid).length;
  return `
    <div class="staff-tools">
      <div class="section-title" style="margin:0;">${t('staffTitle')}</div>
    </div>
    <div class="staff-summary">
      <div class="chip"><div class="chip-n">${nNew}</div><div class="chip-l">${t('chipNew')}</div></div>
      <div class="chip"><div class="chip-n">${nCooking}</div><div class="chip-l">${t('chipCooking')}</div></div>
      <div class="chip"><div class="chip-n">${nServed}</div><div class="chip-l">${t('chipServed')}</div></div>
      <div class="chip"><div class="chip-n">${nUnpaid}</div><div class="chip-l">${t('chipUnpaid')}</div></div>
    </div>
    ${active.length===0?`<div class="empty-state">${t('emptyActive')}<br>${t('emptyActiveSub')}</div>`:
      active.map(orderTicketHtml).join('')}
  `;
}
function orderTicketHtml(o){
  const cookClass = o.status==='new'?'s-new':o.status==='cooking'?'s-cooking':'s-served';
  const cookLabel = (STATUS[lang]&&STATUS[lang][o.status]) || STATUS.ja[o.status];
  const cookNextStatus = o.status==='new'?'cooking':o.status==='cooking'?'served':'';
  const cookNextLabel = o.status==='new'?t('startCooking'):o.status==='cooking'?t('markServed'):'';
  const canComplete = (o.status==='served' && o.paid);
  const serveMetric = fmtMetric(o.createdAt, o.servedAt);
  const payMetric = fmtMetric(o.createdAt, o.paidAt);
  return `
    <div class="order-ticket">
      <div class="ot-head">
        <div class="ot-num">#${String(o.id).padStart(3,'0')}</div>
        <div class="ot-table">${seatLabel(o.table)}</div>
      </div>
      <div class="ot-metric-row">
        <span class="stamp ${cookClass}" style="font-size:11px;padding:2px 8px;">${cookLabel}</span>
        <span class="ot-metric-badge">
          <span class="ot-metric-icon">🍜</span>
          <span class="ot-metric-val ${o.servedAt?'done':'live'}">${serveMetric}</span>
        </span>
      </div>
      <div class="ot-metric-row">
        <span class="stamp ${o.paid?'s-served':'s-new'}" style="font-size:11px;padding:2px 8px;">${o.paid?t('paidLabel'):t('unpaidLabel')}</span>
        <span class="ot-metric-badge">
          <span class="ot-metric-icon">💰</span>
          <span class="ot-metric-val ${o.paidAt?'done':'live'}">${payMetric}</span>
        </span>
      </div>
      <div class="ot-items">
        ${o.items.map(it=>{
          const item = CONFIG.menu.find(m=>m.id===it.itemId);
          const variant = item ? item.variants.find(v=>v.id===it.variantId) : null;
          const parts = [item?tm(item.name):it.itemId];
          if(variant && variant.label) parts.push(tm(variant.label));
          if(it.protein) parts.push(it.protein==='chicken'?t('chickenChashuShort'):it.protein==='ground'?t('groundPorkShort'):t('porkChashuShort'));
          if(it.spice) parts.push(it.spice==='spicy'?t('spicySpice'):t('normalSpice'));
          return `<div class="ot-item-row"><span class="it-qty">×${it.qty}</span><span class="it-desc">${parts.join('・')}</span><span>${it.price*it.qty} ${CONFIG.currency}</span></div>`;
        }).join('')}
      </div>
      ${o.notes?`<div class="ot-notes">📝 ${o.notes}</div>`:''}
      <div class="ot-actions">
        ${cookNextLabel?`<button class="advance-btn ${o.status==='cooking'?'ready':''}" data-act="cook" data-id="${o.id}" data-next="${cookNextStatus}">${cookNextLabel}</button>`:'<span></span>'}
        <button class="advance-btn ${o.paid?'outline':'pay-due'}" data-act="pay" data-id="${o.id}" data-next="${o.paid?'0':'1'}">${o.paid?t('markUnpaid'):t('markPaid')}</button>
      </div>
      ${canComplete?`<div class="ot-actions"><button class="advance-btn ready" data-act="complete" data-id="${o.id}">${t('completeOrder')}</button></div>`:''}
      <div class="ot-actions"><button class="cancel-btn" data-act="cancel" data-id="${o.id}">${t('cancelBtn')}</button></div>
    </div>
  `;
}
function bindStaffButtons(){
  document.querySelectorAll('[data-act="cook"]').forEach(btn=>{
    btn.onclick = ()=>updateOrder(parseInt(btn.dataset.id), {status: btn.dataset.next});
  });
  document.querySelectorAll('[data-act="pay"]').forEach(btn=>{
    btn.onclick = ()=>updateOrder(parseInt(btn.dataset.id), {paid: btn.dataset.next==='1'});
  });
  document.querySelectorAll('[data-act="complete"]').forEach(btn=>{
    btn.onclick = ()=>updateOrder(parseInt(btn.dataset.id), {archived:true});
  });
  document.querySelectorAll('[data-act="cancel"]').forEach(btn=>{
    btn.onclick = ()=>cancelOrder(parseInt(btn.dataset.id));
  });
  const resetBtn = document.getElementById('reset-demo');
  if(resetBtn){ resetBtn.onclick = resetAllOrders; }
}
async function updateOrder(id, patch){
  try{
    await fetch('/api/orders', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, ...patch})});
  }catch(e){ console.error(e); }
  renderStaffLive();
}
async function cancelOrder(id){
  if(!confirm(t('confirmCancel'))) return;
  await updateOrder(id, {archived:true});
}
async function resetAllOrders(){
  if(!confirm(t('confirmResetAll'))) return;
  try{
    await fetch('/api/orders', {method:'DELETE'});
  }catch(e){ console.error(e); }
  renderStaffLive();
}

/* =========================================================
   集計タブ
   ========================================================= */
function summaryHtml(allOrders){
  // アーカイブ済み（完了・取消）も含めた全注文を集計対象にする
  const orders = filterOrders(allOrders, summaryPeriod);
  const totalOrders = orders.length;
  const totalRevenue = orders.reduce((s,o)=>s+o.total,0);
  const avgServe = avgSecs(orders,'servedAt');
  const avgPay = avgSecs(orders,'paidAt');

  // メニュー別集計
  const itemMap = {};
  orders.forEach(o=>{
    (o.items||[]).forEach(it=>{
      const item = CONFIG.menu.find(m=>m.id===it.itemId);
      const name = item?tm(item.name):(it.itemId||'?');
      itemMap[name] = (itemMap[name]||{count:0,revenue:0});
      itemMap[name].count += it.qty;
      itemMap[name].revenue += it.price*it.qty;
    });
  });
  const ranking = Object.entries(itemMap).sort((a,b)=>b[1].count-a[1].count);

  // 席別集計
  const seatMap = {};
  orders.forEach(o=>{
    const s = seatLabel(o.table);
    seatMap[s] = (seatMap[s]||0)+1;
  });
  const seatRows = Object.entries(seatMap).sort((a,b)=>b[1]-a[1]);

  const periods = ['today','yesterday','last7','week','month','all'];
  const periodKeys = {today:'periodToday',yesterday:'periodYesterday',last7:'periodLast7',
                      week:'periodWeek',month:'periodMonth',all:'periodAll'};

  return `
    <div class="summary-period-row">
      ${periods.map(p=>`<button class="summary-period-btn ${summaryPeriod===p?'active':''}" data-period="${p}">${t(periodKeys[p])}</button>`).join('')}
    </div>

    ${totalOrders===0?`<div class="empty-state">${t('noData')}</div>`:`
    <div class="summary-card-grid">
      <div class="summary-card">
        <div class="sc-val">${totalOrders}</div>
        <div class="sc-label">${t('statOrders')}</div>
      </div>
      <div class="summary-card">
        <div class="sc-val">${totalRevenue.toLocaleString()}</div>
        <div class="sc-label">${t('statRevenue')} (${CONFIG.currency})</div>
      </div>
      <div class="summary-card">
        <div class="sc-val sc-time">${fmtAvgTime(avgServe)}</div>
        <div class="sc-label">${t('statAvgServe')}</div>
      </div>
      <div class="summary-card">
        <div class="sc-val sc-time">${fmtAvgTime(avgPay)}</div>
        <div class="sc-label">${t('statAvgPay')}</div>
      </div>
    </div>

    <div class="section-title">${t('rankingTitle')}</div>
    <table class="summary-table">
      ${ranking.map(([name,{count,revenue}],i)=>`
        <tr>
          <td class="st-rank">${i+1}</td>
          <td class="st-name">${name}</td>
          <td class="st-count">${count}点</td>
          <td class="st-rev">${revenue.toLocaleString()} ${CONFIG.currency}</td>
        </tr>
      `).join('')}
    </table>

    <div class="section-title">${t('seatTitle')}</div>
    <table class="summary-table">
      ${seatRows.map(([seat,count])=>`
        <tr>
          <td class="st-name">${seat}</td>
          <td class="st-count">${count}件</td>
        </tr>
      `).join('')}
    </table>

    <button class="csv-btn" id="csv-download">⬇ ${t('csvBtn')}</button>
    `}
    <button class="clear-all-btn" id="reset-demo">🗑 ${t('clearAllBtn')}</button>
  `;
}
function bindSummaryButtons(allOrders){
  document.querySelectorAll('.summary-period-btn').forEach(btn=>{
    btn.onclick = ()=>{ summaryPeriod = btn.dataset.period; renderStaffLive(); };
  });
  const csvBtn = document.getElementById('csv-download');
  if(csvBtn){ csvBtn.onclick = ()=>exportCSV(allOrders); }
  const resetBtn = document.getElementById('reset-demo');
  if(resetBtn){ resetBtn.onclick = resetAllOrders; }
}
function exportCSV(allOrders){
  const orders = filterOrders(allOrders.filter(o=>!o.archived), summaryPeriod);
  const BOM = '\uFEFF';
  const cols = [
    t('csvColNo'), t('csvColDate'), t('csvColSeat'), t('csvColItem'),
    t('csvColSize'), t('csvColProtein'), t('csvColSpice'),
    t('csvColQty'), t('csvColPrice'), t('csvColSubtotal'),
    t('csvColServeMin'), t('csvColPayMin'), t('csvColNotes')
  ];
  const rows = [];
  orders.forEach(o=>{
    const serveMin = o.servedAt ? Math.round((o.servedAt-o.createdAt)/1000) : '';
    const payMin = o.paidAt ? Math.round((o.paidAt-o.createdAt)/1000) : '';
    (o.items||[]).forEach(it=>{
      const item = CONFIG.menu.find(m=>m.id===it.itemId);
      const variant = item?item.variants.find(v=>v.id===it.variantId):null;
      const itemName = item?tm(item.name):(it.itemId||'');
      const sizeName = variant&&variant.label?tm(variant.label):'';
      const proteinName = it.protein==='chicken'?t('chickenChashuShort'):it.protein==='ground'?t('groundPorkShort'):it.protein?t('porkChashuShort'):'';
      const spiceName = it.spice==='spicy'?t('spicySpice'):it.spice?t('normalSpice'):'';
      rows.push([
        o.id, localDateTimeStr(o.createdAt), seatLabel(o.table),
        itemName, sizeName, proteinName, spiceName,
        it.qty, it.price, it.price*it.qty,
        serveMin, payMin, o.notes||''
      ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
    });
  });
  const csv = BOM + cols.map(c=>`"${c}"`).join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const periodKey = {today:'periodToday',yesterday:'periodYesterday',last7:'periodLast7',all:'periodAll'}[summaryPeriod];
  a.download = `ramen-jan_${t(periodKey)}_${localDateStr(Date.now())}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
